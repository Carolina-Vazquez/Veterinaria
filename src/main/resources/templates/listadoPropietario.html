<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Propietarios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Listado de Propietarios</h2>
    <a href="/inicio" class="btn btn-secondary mb-3">Volver</a>
    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>Telefono</th>
                <th>Email</th>
                <th>Direccion</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${propietarios}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.apellidos}"></td>
                <td th:text="${p.telefono}"></td>
                <td th:text="${p.email}"></td>
                <td th:text="${p.direccion}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
