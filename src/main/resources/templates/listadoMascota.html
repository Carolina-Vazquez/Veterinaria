<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Mascotas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Listado de Mascotas</h2>
    <a href="/inicio" class="btn btn-secondary mb-3">Volver</a>
    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Especie</th>
                <th>Raza</th>
                <th>Fecha Nacimiento</th>
                <th>Peso</th>
                <th>Propietario</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${mascotas}">
                <td th:text="${m.id}"></td>
                <td th:text="${m.nombre}"></td>
                <td th:text="${m.especie}"></td>
                <td th:text="${m.raza}"></td>
                <td th:text="${m.fechaNacimiento}"></td>
                <td th:text="${m.peso}"></td>
                <td th:text="${m.propietario != null ? m.propietario.nombre + ' ' + m.propietario.apellidos : 'Sin propietario'}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
