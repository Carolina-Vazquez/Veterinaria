<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta Mascota</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Alta de Mascota</h2>
    <form th:action="@{/altaMascota}" th:object="${mascota}" method="post">
        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}" required>
        </div>
        <div class="mb-3">
            <label>Especie</label>
            <input type="text" class="form-control" th:field="*{especie}" required>
        </div>
        <div class="mb-3">
            <label>Raza</label>
            <input type="text" class="form-control" th:field="*{raza}" required>
        </div>
        <div class="mb-3">
            <label>Fecha de Nacimiento</label>
            <input type="date" class="form-control" th:field="*{fechaNacimiento}" required>
        </div>
        <div class="mb-3">
            <label>Peso (kg)</label>
            <input type="number" step="0.1" class="form-control" th:field="*{peso}" required>
        </div>
        <div class="mb-3">
            <label>Propietario</label>
            <select class="form-select" th:field="*{propietario}">
                <option th:each="p : ${propietarios}"
                        th:value="${p.id}"
                        th:text="${p.nombre + ' ' + p.apellidos}">
                </option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/inicio" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
