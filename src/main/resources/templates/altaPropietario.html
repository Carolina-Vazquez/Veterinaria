<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta Propietario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Alta de Propietario</h2>
    <form th:action="@{/altaPropietario}" th:object="${propietario}" method="post">
        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}" required>
        </div>
        <div class="mb-3">
            <label>Apellidos</label>
            <input type="text" class="form-control" th:field="*{apellidos}" required>
        </div>
        <div class="mb-3">
            <label>Telefono</label>
            <input type="text" class="form-control" th:field="*{telefono}" required>
        </div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <div class="mb-3">
            <label>Direccion</label>
            <input type="text" class="form-control" th:field="*{direccion}" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="/inicio" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
